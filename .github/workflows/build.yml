name: Build APK

# main 브랜치에 코드를 올릴 때(push)나, Actions 탭에서 수동 실행할 때 동작
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Android SDK 설치
        uses: android-actions/setup-android@v3

      - name: Gradle 설정
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'

      - name: 디버그 APK 빌드
        run: gradle assembleDebug --no-daemon

      - name: 빌드된 APK 업로드 (Artifacts에서 다운로드 가능)
        uses: actions/upload-artifact@v4
        with:
          name: MonthlySms-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
